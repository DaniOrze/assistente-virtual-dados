<svg width="720" viewBox="0 0 720 900" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t  { font-family: sans-serif; font-size: 14px; font-weight: 400; fill: #2c2c2a; }
    .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #5f5e5a; }
    .th { font-family: sans-serif; font-size: 14px; font-weight: 600; fill: #2c2c2a; }
    .on-purple .th { fill: #3C3489; }
    .on-purple .ts { fill: #534AB7; }
    .on-teal   .th { fill: #085041; }
    .on-teal   .ts { fill: #0F6E56; }
    .on-blue   .th { fill: #0C447C; }
    .on-blue   .ts { fill: #185FA5; }
    .on-coral  .th { fill: #712B13; }
    .on-coral  .ts { fill: #993C1D; }
    .on-amber  .th { fill: #633806; }
    .on-amber  .ts { fill: #854F0B; }
    .on-gray   .th { fill: #444441; }
    .on-gray   .ts { fill: #5F5E5A; }
    .on-red    .th { fill: #7B1818; }
    .on-red    .ts { fill: #A52020; }
  </style>
</defs>

<!-- FRONTEND LAYER -->
<g class="on-teal">
  <rect x="40" y="30" width="640" height="64" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="360" y="56" text-anchor="middle" dominant-baseline="central">Streamlit frontend</text>
  <text class="ts" x="360" y="75" text-anchor="middle" dominant-baseline="central">Chat input · Visualização dinâmica (tabela / gráfico) · Raciocínio expandível</text>
</g>

<!-- Arrow: frontend -> check_relevance -->
<line x1="360" y1="94" x2="360" y2="128" stroke="#5f5e5a" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="372" y="113" dominant-baseline="central" style="fill:#5f5e5a">pergunta</text>

<!-- LANGGRAPH container -->
<rect x="40" y="128" width="640" height="610" rx="14" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="56" y="146" dominant-baseline="central" style="fill:#888780">LangGraph · AgentState</text>

<!-- NODE 0: check_relevance (entry point) -->
<g class="on-red">
  <rect x="250" y="142" width="220" height="44" rx="8" fill="#FDEAEA" stroke="#A52020" stroke-width="0.5"/>
  <text class="th" x="360" y="158" text-anchor="middle" dominant-baseline="central">check_relevance</text>
  <text class="ts" x="360" y="174" text-anchor="middle" dominant-baseline="central">Pergunta é relevante ao negócio?</text>
</g>

<!-- END path: irrelevant -->
<path d="M470 164 L560 164 L560 190" fill="none" stroke="#A52020" stroke-width="1.0" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="515" y="157" text-anchor="middle" dominant-baseline="central" style="fill:#A52020">irrelevante</text>
<g class="on-red">
  <rect x="510" y="190" width="90" height="30" rx="6" fill="#FDEAEA" stroke="#A52020" stroke-width="0.5"/>
  <text class="th" x="555" y="205" text-anchor="middle" dominant-baseline="central" style="font-size:12px">END</text>
</g>

<!-- Arrow: check_relevance -> resolve_question -->
<line x1="360" y1="186" x2="360" y2="226" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="372" y="208" dominant-baseline="central" style="fill:#534AB7">relevante</text>

<!-- HISTORY node -->
<g class="on-gray">
  <rect x="522" y="234" width="148" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="596" y="250" text-anchor="middle" dominant-baseline="central">Histórico</text>
  <text class="ts" x="596" y="266" text-anchor="middle" dominant-baseline="central">últimas 5 trocas</text>
</g>
<!-- Arrow: Histórico -> resolve_question -->
<path d="M522 256 L470 256" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- NODE 1: resolve_question -->
<g class="on-purple">
  <rect x="250" y="234" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="360" y="250" text-anchor="middle" dominant-baseline="central">resolve_question</text>
  <text class="ts" x="360" y="266" text-anchor="middle" dominant-baseline="central">Reescreve pergunta com contexto</text>
</g>

<line x1="360" y1="278" x2="360" y2="306" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 2: get_schema -->
<g class="on-purple">
  <rect x="250" y="306" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="360" y="322" text-anchor="middle" dominant-baseline="central">get_schema</text>
  <text class="ts" x="360" y="338" text-anchor="middle" dominant-baseline="central">Lê estrutura do SQLite</text>
</g>

<line x1="360" y1="350" x2="360" y2="378" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 3: plan_query -->
<g class="on-purple">
  <rect x="250" y="378" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="360" y="394" text-anchor="middle" dominant-baseline="central">plan_query</text>
  <text class="ts" x="360" y="410" text-anchor="middle" dominant-baseline="central">Decide: simples ou multi-step?</text>
</g>

<!-- Labels das branches -->
<text class="ts" x="210" y="440" text-anchor="middle" dominant-baseline="central" style="fill:#5f5e5a">simples</text>
<text class="ts" x="510" y="440" text-anchor="middle" dominant-baseline="central" style="fill:#5f5e5a">multi-step</text>

<!-- Branch arrows from plan_query -->
<path d="M310 422 L210 422 L210 464" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M410 422 L510 422 L510 464" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 4a: generate_sql -->
<g class="on-blue">
  <rect x="100" y="464" width="220" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="210" y="480" text-anchor="middle" dominant-baseline="central">generate_sql</text>
  <text class="ts" x="210" y="496" text-anchor="middle" dominant-baseline="central">Gera SQL com Claude</text>
</g>

<!-- NODE 4b: generate_sql_step -->
<g class="on-blue">
  <rect x="400" y="464" width="220" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="510" y="480" text-anchor="middle" dominant-baseline="central">generate_sql_step</text>
  <text class="ts" x="510" y="496" text-anchor="middle" dominant-baseline="central">Gera SQL de cada passo</text>
</g>

<line x1="210" y1="508" x2="210" y2="536" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="510" y1="508" x2="510" y2="536" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 5a: execute_sql -->
<g class="on-coral">
  <rect x="100" y="536" width="220" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="210" y="552" text-anchor="middle" dominant-baseline="central">execute_sql</text>
  <text class="ts" x="210" y="568" text-anchor="middle" dominant-baseline="central">Roda query no SQLite</text>
</g>

<!-- NODE 5b: execute_sql_step -->
<g class="on-coral">
  <rect x="400" y="536" width="220" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="510" y="552" text-anchor="middle" dominant-baseline="central">execute_sql_step</text>
  <text class="ts" x="510" y="568" text-anchor="middle" dominant-baseline="central">Executa passo atual</text>
</g>

<!-- Retry loop esquerdo (erro -> regenera SQL) -->
<path d="M100 558 L76 558 L76 486 L100 486" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="64" y="518" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">retry</text>
<text class="ts" x="64" y="532" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">≤3x</text>

<!-- Retry loop direito (erro no step -> regenera step) -->
<path d="M620 558 L650 558 L650 486 L620 486" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="660" y="510" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">retry</text>
<text class="ts" x="660" y="524" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">≤3x</text>

<!-- Next step loop (sucesso no step -> próximo step) -->
<path d="M620 542 L670 542 L670 460 L620 460" fill="none" stroke="#185FA5" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="682" y="500" text-anchor="middle" dominant-baseline="central" style="fill:#185FA5;font-size:10px">próx.</text>
<text class="ts" x="682" y="514" text-anchor="middle" dominant-baseline="central" style="fill:#185FA5;font-size:10px">passo</text>

<!-- Arrows to format_answer -->
<path d="M210 580 L210 610 L360 610 L360 636" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M510 580 L510 610 L360 610 L360 636" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 6: format_answer -->
<g class="on-purple">
  <rect x="250" y="636" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="360" y="652" text-anchor="middle" dominant-baseline="central">format_answer</text>
  <text class="ts" x="360" y="668" text-anchor="middle" dominant-baseline="central">Resposta + tipo de gráfico</text>
</g>

<line x1="360" y1="680" x2="360" y2="708" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- SQLITE DB -->
<g class="on-amber">
  <rect x="200" y="708" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="360" y="724" text-anchor="middle" dominant-baseline="central">SQLite · anexo_desafio_1.db</text>
  <text class="ts" x="360" y="740" text-anchor="middle" dominant-baseline="central">clientes · compras · suporte · campanhas</text>
</g>

<!-- LLM node -->
<g class="on-gray">
  <rect x="54" y="636" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="129" y="652" text-anchor="middle" dominant-baseline="central">Claude LLM</text>
  <text class="ts" x="129" y="668" text-anchor="middle" dominant-baseline="central">claude-opus-4-5</text>
</g>

<!-- LLM usado em: check_relevance, resolve_question, plan_query, generate_sql/step, format_answer -->
<path d="M129 636 L129 164 L250 164" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="100" y="390" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px;writing-mode:tb">usa LLM</text>

<!-- Return arrow: resposta volta ao frontend -->
<path d="M200 730 L160 730 L160 860 L360 860 L360 94" fill="none" stroke="#888780" stroke-width="0.9" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="172" y="798" text-anchor="middle" dominant-baseline="central" style="fill:#888780">resposta</text>
<text class="ts" x="172" y="814" text-anchor="middle" dominant-baseline="central" style="fill:#888780">+ viz</text>

<!-- Legend -->
<rect x="40" y="874" width="12" height="12" rx="2" fill="#FDEAEA" stroke="#A52020" stroke-width="0.5"/>
<text class="ts" x="58" y="880" dominant-baseline="central">Filtro / rota</text>
<rect x="148" y="874" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="166" y="880" dominant-baseline="central">Nós do agente</text>
<rect x="278" y="874" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="296" y="880" dominant-baseline="central">Geração SQL</text>
<rect x="388" y="874" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="406" y="880" dominant-baseline="central">Execução SQL</text>
<rect x="498" y="874" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="516" y="880" dominant-baseline="central">Banco de dados</text>
<line x1="616" y1="880" x2="638" y2="880" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="644" y="880" dominant-baseline="central">dados/LLM</text>
</svg>
