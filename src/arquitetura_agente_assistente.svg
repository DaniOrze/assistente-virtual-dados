<svg width="720" viewBox="0 0 720 820" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .t  { font-family: sans-serif; font-size: 14px; font-weight: 400; fill: #2c2c2a; }
    .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #5f5e5a; }
    .th { font-family: sans-serif; font-size: 14px; font-weight: 600; fill: #2c2c2a; }
    .on-purple .th { fill: #3C3489; }
    .on-purple .ts { fill: #534AB7; }
    .on-teal   .th { fill: #085041; }
    .on-teal   .ts { fill: #0F6E56; }
    .on-blue   .th { fill: #0C447C; }
    .on-blue   .ts { fill: #185FA5; }
    .on-coral  .th { fill: #712B13; }
    .on-coral  .ts { fill: #993C1D; }
    .on-amber  .th { fill: #633806; }
    .on-amber  .ts { fill: #854F0B; }
    .on-gray   .th { fill: #444441; }
    .on-gray   .ts { fill: #5F5E5A; }
  </style>
</defs>

<!-- FRONTEND LAYER -->
<g class="on-teal">
  <rect x="40" y="30" width="640" height="64" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="th" x="360" y="56" text-anchor="middle" dominant-baseline="central">Streamlit frontend</text>
  <text class="ts" x="360" y="75" text-anchor="middle" dominant-baseline="central">Chat input · Visualização dinâmica (tabela / gráfico) · Raciocínio expandível</text>
</g>

<!-- Arrow: frontend -> resolve_question (com label ao lado, sem sobreposição) -->
<line x1="360" y1="94" x2="360" y2="128" stroke="#5f5e5a" stroke-width="1.2" marker-end="url(#arrow)"/>
<text class="ts" x="372" y="113" dominant-baseline="central" style="fill:#5f5e5a">pergunta</text>

<!-- LANGGRAPH container -->
<rect x="40" y="128" width="640" height="530" rx="14" fill="none" stroke="#b4b2a9" stroke-width="0.5" stroke-dasharray="6 4"/>
<text class="ts" x="56" y="146" dominant-baseline="central" style="fill:#888780">LangGraph · AgentState</text>

<!-- HISTORY node — posicionado à direita, seta chega ao topo do resolve_question -->
<g class="on-gray">
  <rect x="522" y="136" width="148" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="596" y="152" text-anchor="middle" dominant-baseline="central">Histórico</text>
  <text class="ts" x="596" y="168" text-anchor="middle" dominant-baseline="central">últimas 5 trocas</text>
</g>
<!-- Seta do Histórico -> resolve_question (entra pelo lado direito do nó) -->
<path d="M522 158 L470 158" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- NODE 1: resolve_question -->
<g class="on-purple">
  <rect x="250" y="142" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="360" y="158" text-anchor="middle" dominant-baseline="central">resolve_question</text>
  <text class="ts" x="360" y="174" text-anchor="middle" dominant-baseline="central">Reescreve pergunta com contexto</text>
</g>

<line x1="360" y1="186" x2="360" y2="214" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 2: get_schema -->
<g class="on-purple">
  <rect x="250" y="214" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="360" y="230" text-anchor="middle" dominant-baseline="central">get_schema</text>
  <text class="ts" x="360" y="246" text-anchor="middle" dominant-baseline="central">Lê estrutura do SQLite</text>
</g>

<line x1="360" y1="258" x2="360" y2="286" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 3: plan_query -->
<g class="on-purple">
  <rect x="250" y="286" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="360" y="302" text-anchor="middle" dominant-baseline="central">plan_query</text>
  <text class="ts" x="360" y="318" text-anchor="middle" dominant-baseline="central">Decide: simples ou multi-step?</text>
</g>

<!-- Labels das branches -->
<text class="ts" x="210" y="348" text-anchor="middle" dominant-baseline="central" style="fill:#5f5e5a">simples</text>
<text class="ts" x="510" y="348" text-anchor="middle" dominant-baseline="central" style="fill:#5f5e5a">multi-step</text>

<!-- Branch arrows from plan_query -->
<path d="M310 330 L210 330 L210 372" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M410 330 L510 330 L510 372" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 4a: generate_sql -->
<g class="on-blue">
  <rect x="100" y="372" width="220" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="210" y="388" text-anchor="middle" dominant-baseline="central">generate_sql</text>
  <text class="ts" x="210" y="404" text-anchor="middle" dominant-baseline="central">Gera SQL com Claude</text>
</g>

<!-- NODE 4b: generate_sql_step -->
<g class="on-blue">
  <rect x="400" y="372" width="220" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="510" y="388" text-anchor="middle" dominant-baseline="central">generate_sql_step</text>
  <text class="ts" x="510" y="404" text-anchor="middle" dominant-baseline="central">Gera SQL de cada passo</text>
</g>

<line x1="210" y1="416" x2="210" y2="444" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>
<line x1="510" y1="416" x2="510" y2="444" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 5a: execute_sql -->
<g class="on-coral">
  <rect x="100" y="444" width="220" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="210" y="460" text-anchor="middle" dominant-baseline="central">execute_sql</text>
  <text class="ts" x="210" y="476" text-anchor="middle" dominant-baseline="central">Roda query no SQLite</text>
</g>

<!-- NODE 5b: execute_sql_step -->
<g class="on-coral">
  <rect x="400" y="444" width="220" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text class="th" x="510" y="460" text-anchor="middle" dominant-baseline="central">execute_sql_step</text>
  <text class="ts" x="510" y="476" text-anchor="middle" dominant-baseline="central">Executa passo atual</text>
</g>

<!-- Retry loop esquerdo -->
<path d="M100 466 L76 466 L76 394 L100 394" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="64" y="426" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">retry</text>
<text class="ts" x="64" y="440" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">≤3x</text>

<!-- Retry loop direito -->
<path d="M620 466 L644 466 L644 394 L620 394" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts" x="656" y="420" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">próx.</text>
<text class="ts" x="656" y="434" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">passo</text>
<text class="ts" x="656" y="448" text-anchor="middle" dominant-baseline="central" style="fill:#888780;font-size:10px">/ retry</text>

<!-- Arrows to format_answer -->
<path d="M210 488 L210 518 L360 518 L360 544" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>
<path d="M510 488 L510 518 L360 518 L360 544" fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- NODE 6: format_answer -->
<g class="on-purple">
  <rect x="250" y="544" width="220" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="360" y="560" text-anchor="middle" dominant-baseline="central">format_answer</text>
  <text class="ts" x="360" y="576" text-anchor="middle" dominant-baseline="central">Resposta + tipo de gráfico</text>
</g>

<line x1="360" y1="588" x2="360" y2="616" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)"/>

<!-- SQLITE DB -->
<g class="on-amber">
  <rect x="200" y="616" width="320" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="th" x="360" y="632" text-anchor="middle" dominant-baseline="central">SQLite · clientes_completo.db</text>
  <text class="ts" x="360" y="648" text-anchor="middle" dominant-baseline="central">clientes · compras · suporte · campanhas</text>
</g>

<!-- LLM node — reposicionado para não colidir com setas -->
<g class="on-gray">
  <rect x="54" y="544" width="150" height="44" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text class="th" x="129" y="560" text-anchor="middle" dominant-baseline="central">Claude LLM</text>
  <text class="ts" x="129" y="576" text-anchor="middle" dominant-baseline="central">claude-opus-4-5</text>
</g>

<!-- LLM -> generate_sql (seta saindo do topo do LLM, indo para o nó azul esquerdo) -->
<path d="M129 544 L129 394 L100 394" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<!-- LLM -> resolve_question (seta saindo da direita do LLM, indo para o nó 1) -->
<path d="M204 557 L250 200 " fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Return arrow: sai do lado esquerdo do DB, desce, vai para o frontend -->
<!-- Label horizontal acima da seta vertical de retorno -->
<path d="M200 638 L160 638 L160 770 L360 770 L360 94" fill="none" stroke="#888780" stroke-width="0.9" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text class="ts" x="172" y="712" text-anchor="middle" dominant-baseline="central" style="fill:#888780">resposta</text>
<text class="ts" x="172" y="728" text-anchor="middle" dominant-baseline="central" style="fill:#888780">+ viz</text>

<!-- Legend (abaixo do container, com folga) -->
<rect x="40" y="784" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts" x="58" y="790" dominant-baseline="central">Nós do agente</text>
<rect x="168" y="784" width="12" height="12" rx="2" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="ts" x="186" y="790" dominant-baseline="central">Geração SQL</text>
<rect x="288" y="784" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts" x="306" y="790" dominant-baseline="central">Execução SQL</text>
<rect x="408" y="784" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts" x="426" y="790" dominant-baseline="central">Banco de dados</text>
<line x1="526" y1="790" x2="548" y2="790" stroke="#888780" stroke-width="0.8" stroke-dasharray="4 3"/>
<text class="ts" x="554" y="790" dominant-baseline="central">fluxo de dados</text>
</svg>
